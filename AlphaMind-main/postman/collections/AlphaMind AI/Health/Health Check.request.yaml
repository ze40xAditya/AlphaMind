$kind: http-request
name: Health Check
method: GET
url: '{{baseUrl}}/api/v1/health/'
order: 1000
auth:
  type: noauth
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() { pm.response.to.have.status(200); });
      var json = pm.response.json();
      pm.test("Response has status field equal to healthy", function() { pm.expect(json.status).to.eql("healthy"); });
      pm.test("Response has service field", function() { pm.expect(json).to.have.property("service"); });
