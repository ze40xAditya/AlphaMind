$kind: http-request
name: Get Invoice - Not Found
method: GET
url: '{{baseUrl}}/api/v1/invoices/999999'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 404", function() { pm.response.to.have.status(404); });
