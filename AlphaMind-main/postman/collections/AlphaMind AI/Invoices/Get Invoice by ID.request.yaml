$kind: http-request
name: Get Invoice by ID
method: GET
url: '{{baseUrl}}/api/v1/invoices/1'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 404", function() {
        pm.expect([200, 404]).to.include(pm.response.code);
      });
