$kind: http-request
name: Generate Invoice
method: POST
url: '{{baseUrl}}/api/v1/invoices/generate/1'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 400", function() {
        pm.expect([200, 400]).to.include(pm.response.code);
      });
      if (pm.response.code === 200) {
        var json = pm.response.json();
        pm.test("Response has invoice", function() { pm.expect(json).to.have.property("invoice"); });
        pm.test("Response has message", function() { pm.expect(json).to.have.property("message"); });
      }
