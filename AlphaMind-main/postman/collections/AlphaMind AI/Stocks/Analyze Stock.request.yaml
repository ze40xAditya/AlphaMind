$kind: http-request
name: Analyze Stock
method: GET
url: '{{baseUrl}}/api/v1/stocks/analyze/{{testStockSymbol}}'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() { pm.response.to.have.status(200); });
      var json = pm.response.json();
      pm.test("Response has symbol", function() { pm.expect(json).to.have.property("symbol"); });
      pm.test("Response has at least one analysis field", function() {
        var hasField = json.hasOwnProperty("technical_analysis") || json.hasOwnProperty("fundamental_analysis") || json.hasOwnProperty("score");
        pm.expect(hasField).to.be.true;
      });
