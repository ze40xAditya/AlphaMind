$kind: http-request
name: Get Stock Details
method: GET
url: '{{baseUrl}}/api/v1/stocks/details/{{testStockSymbol}}'
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() { pm.response.to.have.status(200); });
      var json = pm.response.json();
      pm.test("Response has symbol", function() { pm.expect(json).to.have.property("symbol"); });
