$kind: http-request
name: Get All Users
method: GET
url: '{{baseUrl}}/api/v1/users/'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() { pm.response.to.have.status(200); });
      var json = pm.response.json();
      pm.test("Response is an array", function() { pm.expect(json).to.be.an("array"); });
      pm.test("Array length is greater than 0", function() { pm.expect(json.length).to.be.above(0); });
