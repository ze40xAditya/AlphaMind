$kind: http-request
name: Get All Users - Non-Admin
method: GET
url: '{{baseUrl}}/api/v1/users/'
order: 8000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 403", function() { pm.response.to.have.status(403); });
