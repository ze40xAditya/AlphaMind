$kind: http-request
name: Delete User
method: DELETE
url: '{{baseUrl}}/api/v1/users/{{createdUserId}}'
order: 7000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 204", function() { pm.response.to.have.status(204); });
