$kind: http-request
name: Update User
method: PUT
url: '{{baseUrl}}/api/v1/users/{{createdUserId}}'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "is_active": false
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() { pm.response.to.have.status(200); });
      var json = pm.response.json();
      pm.test("is_active equals false", function() { pm.expect(json.is_active).to.be.false; });
