$kind: http-request
name: Create User
method: POST
url: '{{baseUrl}}/api/v1/users/'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "testuser_{{$randomInt}}",
      "email": "testuser_{{$randomInt}}@example.com",
      "password": "Test@1234",
      "role": "user"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", function() { pm.response.to.have.status(201); });
      var json = pm.response.json();
      pm.test("Response has id", function() { pm.expect(json).to.have.property("id"); });
      pm.test("Response has username", function() { pm.expect(json).to.have.property("username"); });
      pm.test("Response has email", function() { pm.expect(json).to.have.property("email"); });
      pm.test("Response has role", function() { pm.expect(json).to.have.property("role"); });
      pm.test("role equals user", function() { pm.expect(json.role).to.eql("user"); });
      pm.environment.set("createdUserId", json.id);
