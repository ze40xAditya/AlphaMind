$kind: http-request
name: Login - Invalid Credentials
method: POST
url: '{{baseUrl}}/api/v1/auth/login'
order: 3000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "wrong@example.com",
      "password": "wrongpassword"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 401", function() { pm.response.to.have.status(401); });
      pm.test("Response contains Incorrect email or password", function() { pm.expect(pm.response.text()).to.include("Incorrect email or password"); });
