$kind: http-request
name: Login - Admin
method: POST
url: '{{baseUrl}}/api/v1/auth/login'
order: 1000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{adminEmail}}",
      "password": "{{adminPassword}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() { pm.response.to.have.status(200); });
      var json = pm.response.json();
      pm.test("Response has access_token", function() { pm.expect(json.access_token).to.be.a("string"); });
      pm.test("token_type equals bearer", function() { pm.expect(json.token_type).to.eql("bearer"); });
      pm.environment.set("adminToken", json.access_token);
      pm.environment.set("authToken", json.access_token);
