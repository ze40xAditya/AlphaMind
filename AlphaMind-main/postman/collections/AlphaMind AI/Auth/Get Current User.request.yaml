$kind: http-request
name: Get Current User
method: GET
url: '{{baseUrl}}/api/v1/auth/me'
order: 4000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() { pm.response.to.have.status(200); });
      var json = pm.response.json();
      pm.test("Response has id", function() { pm.expect(json).to.have.property("id"); });
      pm.test("Response has username", function() { pm.expect(json).to.have.property("username"); });
      pm.test("Response has email", function() { pm.expect(json).to.have.property("email"); });
      pm.test("Response has role", function() { pm.expect(json).to.have.property("role"); });
      pm.test("Response has is_active", function() { pm.expect(json).to.have.property("is_active"); });
      pm.test("is_active is true", function() { pm.expect(json.is_active).to.be.true; });
