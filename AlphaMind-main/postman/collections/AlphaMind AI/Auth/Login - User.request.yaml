$kind: http-request
name: Login - User
method: POST
url: '{{baseUrl}}/api/v1/auth/login'
order: 2000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{userEmail}}",
      "password": "{{userPassword}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() { pm.response.to.have.status(200); });
      var json = pm.response.json();
      pm.test("Response has access_token", function() { pm.expect(json.access_token).to.be.a("string"); });
      pm.environment.set("authToken", json.access_token);
